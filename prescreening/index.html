<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прескрининг — Проф. Сушков С.В. | МЦ MARIA</title>
<style>
  :root{
    --bg:#FAF8F3;
    --ink:#1B2B26;
    --ink-soft:#4A5A54;
    --emerald:#123832;
    --emerald-light:#1F5148;
    --gold:#B8923F;
    --gold-soft:#E8D9B0;
    --card:#FFFFFF;
    --line:#E4DFD3;
    --danger:#A8442E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:32px 16px;
  }
  .wrap{width:100%;max-width:560px;}
  .brand{
    text-align:center;
    margin-bottom:20px;
  }
  .brand .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:700;
  }
  .brand h1{
    font-family:Georgia,"Times New Roman",serif;
    font-size:22px;
    margin:6px 0 0;
    color:var(--emerald);
    font-weight:600;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:32px 28px;
    box-shadow:0 1px 3px rgba(18,56,50,.06), 0 8px 24px rgba(18,56,50,.05);
  }
  .ecg{
    width:100%;
    height:20px;
    margin:22px 0;
    opacity:.55;
  }
  .ecg path{
    fill:none;
    stroke:var(--emerald);
    stroke-width:1.6;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .progress{
    display:flex;
    gap:6px;
    margin-bottom:4px;
  }
  .progress span{
    height:3px;
    flex:1;
    background:var(--line);
    border-radius:2px;
    transition:background .3s;
  }
  .progress span.done{background:var(--emerald);}
  .step-label{
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:18px;
  }
  h2.q{
    font-family:Georgia,serif;
    font-size:19px;
    font-weight:600;
    color:var(--emerald);
    margin:0 0 20px;
    line-height:1.4;
  }
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{
    text-align:left;
    padding:14px 16px;
    border:1.5px solid var(--line);
    background:#fff;
    border-radius:10px;
    font-size:15px;
    color:var(--ink);
    cursor:pointer;
    transition:.15s;
    font-family:inherit;
  }
  .opt:hover{border-color:var(--emerald-light);background:#F4F8F6;}
  .opt:active{transform:scale(.99);}
  .back{
    margin-top:20px;
    background:none;
    border:none;
    color:var(--ink-soft);
    font-size:13px;
    cursor:pointer;
    padding:4px 0;
  }
  .back:hover{color:var(--emerald);}
  .badge{
    display:inline-block;
    padding:6px 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    letter-spacing:.04em;
    text-transform:uppercase;
    margin-bottom:16px;
  }
  .badge.urgent{background:#F6E4E0;color:var(--danger);}
  .badge.soon{background:var(--gold-soft);color:#7A5E1F;}
  .badge.routine{background:#E1EEE9;color:var(--emerald);}
  .result-title{
    font-family:Georgia,serif;
    font-size:21px;
    color:var(--emerald);
    margin:0 0 10px;
    line-height:1.35;
  }
  .result-text{
    font-size:15px;
    color:var(--ink-soft);
    line-height:1.6;
    margin-bottom:22px;
  }
  .price-row{
    display:flex;
    align-items:baseline;
    gap:8px;
    padding:16px 18px;
    background:#F6F4EE;
    border-radius:10px;
    margin-bottom:22px;
  }
  .price-row .amount{
    font-family:Georgia,serif;
    font-size:26px;
    color:var(--emerald);
    font-weight:700;
  }
  .price-row .label{font-size:13px;color:var(--ink-soft);}
  .cta{
    display:block;
    text-align:center;
    padding:15px 18px;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    text-decoration:none;
    margin-bottom:10px;
    transition:.15s;
  }
  .cta.primary{background:var(--emerald);color:#fff;}
  .cta.primary:hover{background:var(--emerald-light);}
  .cta.secondary{background:#fff;color:var(--emerald);border:1.5px solid var(--emerald);}
  .cta.secondary:hover{background:#F4F8F6;}
  .disclaimer{
    font-size:12px;
    color:var(--ink-soft);
    text-align:center;
    margin-top:18px;
    line-height:1.5;
  }
  .restart{
    display:block;
    text-align:center;
    margin-top:14px;
    font-size:13px;
    color:var(--ink-soft);
    background:none;
    border:none;
    cursor:pointer;
    text-decoration:underline;
  }
</style>
<!-- Google Tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-849M3X6NTX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-849M3X6NTX');
</script>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1428611006597338"
     crossorigin="anonymous"></script>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="eyebrow">МЦ MARIA · Харьков</div>
    <h1>Прескрининг перед консультацией</h1>
  </div>
  <div class="card" id="app"></div>
</div>

<script>
const API_URL = 'https://ssv-log-api.vercel.app/api/log-click';

function logClick(event, detail) {
  try {
    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ event, detail: detail || '', ts: Date.now() }),
    }).catch(() => {});
  } catch (e) {}
}

const svgECG = `<svg class="ecg" viewBox="0 0 400 20" preserveAspectRatio="none">
  <path d="M0,10 L140,10 L155,10 L165,2 L175,18 L185,4 L195,10 L400,10"/>
</svg>`;

const state = { branch: null, step: 0, answers: {}, expertChoice: null };

const expertOptions = [
  {
    key: "second-opinion",
    icon: "🧩",
    title: "Второе мнение по сложному случаю",
    who: "Пациенты и коллеги-хирурги",
    text: "Независимая оценка диагноза, тактики лечения и объёма операции на основании вашей медицинской документации — выписок, протоколов, снимков КТ/МРТ. Письменное профессорское заключение.",
    format: "Очно — 2000 ₴ · онлайн и заочно — стоимость обсуждается индивидуально"
  },
  {
    key: "science",
    icon: "📚",
    title: "Научное рецензирование и редактирование",
    who: "Исследователи, аспиранты, кафедры",
    text: "Рецензирование статей перед подачей в журнал, научное редактирование диссертаций и монографий, помощь с систематическими обзорами, докладами и презентациями для конгрессов.",
    format: "Стоимость и сроки — по email, зависят от объёма работы"
  },
  {
    key: "tourism",
    icon: "✈️",
    title: "Медицинский туризм за рубежом",
    who: "Пациенты и семьи",
    text: "Подбор ведущих специалистов и клиник (Германия, Израиль, Австрия, Польша, Турция и другие страны), перевод и подготовка медицинской документации, сопровождение переписки с иностранной клиникой.",
    format: "Индивидуальный расчёт после анализа ситуации"
  },
  {
    key: "academic",
    icon: "🎓",
    title: "Академическое сотрудничество",
    who: "Кафедры, университеты, ассоциации",
    text: "Совместная научная работа, авторские лекционные курсы, программы последипломного образования, курсы медицинского усовершенствования на 18–108 академических часов — очно и онлайн.",
    format: "Условия сотрудничества согласовываются индивидуально"
  },
  {
    key: "ai",
    icon: "🤖",
    title: "AI и цифровая медицина",
    who: "Клиницисты и разработчики",
    text: "Консультации по внедрению AI-инструментов в клиническую практику: диагностика по КТ/МРТ, предиктивные модели рисков, автоматизация документации. Разработка ПО под задачи конкретной клиники или кафедры.",
    format: "Обсуждение и оценка объёма работ — индивидуально"
  }
];

function renderEntry(app){
  app.innerHTML = `
    <h2 class="q" style="margin-bottom:22px;">Кто вы?</h2>
    <div class="options">
      <button class="opt" id="branchPatient">
        <strong>Я пациент</strong><br>
        <span style="color:var(--ink-soft);font-size:13.5px;">Есть жалобы или планирую лечение/операцию</span>
      </button>
      <button class="opt" id="branchExpert">
        <strong>Я врач / исследователь / учреждение</strong><br>
        <span style="color:var(--ink-soft);font-size:13.5px;">Второе мнение, рецензирование, медтуризм, сотрудничество, AI</span>
      </button>
    </div>
    ${svgECG}
  `;
  document.getElementById('branchPatient').addEventListener('click', ()=>{
    state.branch = 'patient'; state.step = 0; render();
    logClick('branch_selected', 'patient');
  });
  document.getElementById('branchExpert').addEventListener('click', ()=>{
    state.branch = 'expert'; render();
    logClick('branch_selected', 'expert');
  });
}

function renderExpertMenu(app){
  app.innerHTML = `
    <button class="back" id="toEntry" style="margin-bottom:14px;">← Назад</button>
    <h2 class="q">Экспертные услуги профессора Сушкова</h2>
    <div class="options">
      ${expertOptions.map(o=>`
        <button class="opt" data-key="${o.key}">
          <span style="font-size:18px;">${o.icon}</span> <strong>${o.title}</strong><br>
          <span style="color:var(--ink-soft);font-size:13px;">${o.who}</span>
        </button>
      `).join('')}
    </div>
    ${svgECG}
  `;
  document.getElementById('toEntry').addEventListener('click', ()=>{ state.branch=null; render(); });
  app.querySelectorAll('.opt[data-key]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.expertChoice = btn.dataset.key;
      logClick('expert_selected', btn.dataset.key);
      render();
    });
  });
}

function renderExpertResult(app){
  const o = expertOptions.find(x=>x.key===state.expertChoice);
  app.innerHTML = `
    <span class="badge routine">${o.who}</span>
    <h2 class="result-title">${o.icon} ${o.title}</h2>
    <p class="result-text">${o.text}</p>
    ${svgECG}
    <div class="price-row">
      <span class="label">${o.format}</span>
    </div>
    <a class="cta primary" href="mailto:ssvproff@gmail.com?subject=${encodeURIComponent(o.title)}" onclick="logClick('cta_email','${o.key}')">Написать на email</a>
    <a class="cta secondary" href="https://t.me/SSVproff_medical_bot" target="_blank" onclick="logClick('cta_telegram','${o.key}')">Telegram-бот</a>
    <a class="cta secondary" href="https://ssvnauka.com/expert/" target="_blank" onclick="logClick('cta_website','${o.key}')">Подробнее на сайте</a>
    <div class="disclaimer">Ответ в течение 24 часов. Формат работы (очно / онлайн / заочно) согласуется индивидуально.</div>
    <button class="restart" id="restartBtn">← Другие направления</button>
  `;
  document.getElementById('restartBtn').addEventListener('click', ()=>{
    state.expertChoice = null; render();
  });
}

const questions = [
  {
    key: "concern",
    label: "Шаг 1 из 3",
    q: "Что вас беспокоит?",
    options: [
      { text: "Боль в животе / подозрение на хирургическую патологию", value: "surgical" },
      { text: "Онкологический вопрос (образование, подозрительные анализы, наблюдение)", value: "oncology" },
      { text: "Миома матки / гинекологическая проблема", value: "gyneco" },
      { text: "Не уверен(а), нужна консультация для уточнения", value: "unsure" }
    ]
  },
  {
    key: "duration",
    label: "Шаг 2 из 3",
    q: "Как давно это беспокоит или было обнаружено?",
    options: [
      { text: "Менее недели, симптомы нарастают", value: "acute" },
      { text: "От недели до месяца", value: "recent" },
      { text: "Больше месяца, стабильно", value: "chronic" },
      { text: "Случайная находка на УЗИ/КТ, симптомов нет", value: "incidental" }
    ]
  },
  {
    key: "docs",
    label: "Шаг 3 из 3",
    q: "У вас есть результаты обследований (УЗИ, КТ, анализы) на руках?",
    options: [
      { text: "Да, есть свежие (менее 3 месяцев)", value: "fresh" },
      { text: "Есть, но старые", value: "old" },
      { text: "Нет, ничего не делал(а)", value: "none" }
    ]
  }
];

function render(){
  const app = document.getElementById('app');

  if(state.branch === null){
    renderEntry(app);
    return;
  }
  if(state.branch === 'expert'){
    if(state.expertChoice){
      renderExpertResult(app);
    } else {
      renderExpertMenu(app);
    }
    return;
  }
  if(state.step < questions.length){
    const q = questions[state.step];
    app.innerHTML = `
      <div class="progress">
        ${questions.map((_,i)=>`<span class="${i<=state.step?'done':''}"></span>`).join('')}
      </div>
      <div class="step-label">${q.label}</div>
      <h2 class="q">${q.q}</h2>
      <div class="options">
        ${q.options.map(o=>`<button class="opt" data-key="${q.key}" data-value="${o.value}">${o.text}</button>`).join('')}
      </div>
      ${svgECG}
      <button class="back" id="backBtn">← Назад</button>
    `;
    app.querySelectorAll('.opt').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.answers[btn.dataset.key] = btn.dataset.value;
        logClick('question_answered', `${btn.dataset.key}:${btn.dataset.value}`);
        state.step++;
        render();
      });
    });
    document.getElementById('backBtn').addEventListener('click', ()=>{
      if(state.step>0){ state.step--; } else { state.branch = null; state.answers = {}; }
      render();
    });
  } else {
    renderResult(app);
  }
}

function assessUrgency(){
  const {concern, duration, docs} = state.answers;
  if(duration === "acute" && concern === "surgical") return "urgent";
  if(concern === "oncology" && (duration === "acute" || duration === "incidental")) return "urgent";
  if(duration === "recent") return "soon";
  return "routine";
}

function renderResult(app){
  const urgency = assessUrgency();
  const {concern, docs} = state.answers;

  const urgencyMap = {
    urgent:  { badge:"Рекомендуем не откладывать", cls:"urgent",
      text:"По вашим ответам ситуация может требовать оперативной оценки. Рекомендуем записаться на очную или онлайн-консультацию в ближайшие 1–3 дня." },
    soon:    { badge:"Плановая консультация в ближайшие дни", cls:"soon",
      text:"Ситуация не выглядит экстренной, но откладывать надолго не стоит. Оптимально записаться в течение недели." },
    routine: { badge:"Плановая консультация", cls:"routine",
      text:"По вашим ответам это плановый случай. Консультация поможет уточнить диагноз и определить дальнейшую тактику без спешки." }
  };

  const concernLabel = {
    surgical:"хирургической патологии",
    oncology:"онкологическому вопросу",
    gyneco:"миоме матки",
    unsure:"вашему случаю"
  }[concern] || "вашему случаю";

  const docsNote = docs === "none"
    ? " Возьмите с собой (или на онлайн-консультацию) любые имеющиеся медицинские документы — при их отсутствии врач определит, какие обследования нужны."
    : " Возьмите результаты обследований с собой — это ускорит консультацию.";

  const r = urgencyMap[urgency];

  app.innerHTML = `
    <span class="badge ${r.cls}">${r.badge}</span>
    <h2 class="result-title">Рекомендация по ${concernLabel}</h2>
    <p class="result-text">${r.text}${docsNote}</p>
    ${svgECG}
    <div class="price-row">
      <span class="amount">2000 ₴</span>
      <span class="label">стоимость консультации (~$50), 40+ лет опыта, доктор мед. наук</span>
    </div>
    <a class="cta primary" href="https://t.me/SSVPROFF_MEDICAL" target="_blank" onclick="logClick('cta_telegram_patient','${urgency}')">Записаться через Telegram-бот</a>
    <a class="cta secondary" href="tel:+380675707949" onclick="logClick('cta_phone_patient','${urgency}')">Позвонить: +380 67 570 79 49</a>
    <a class="cta secondary" href="https://ssvnauka.com" target="_blank" onclick="logClick('cta_website_patient','${urgency}')">Записаться на сайте ssvnauka.com</a>
    <div class="disclaimer">
      Это предварительная оценка срочности, а не диагноз. Окончательное решение принимается врачом на консультации.
    </div>
    <button class="restart" id="restartBtn">Пройти заново</button>
  `;
  document.getElementById('restartBtn').addEventListener('click', ()=>{
    state.branch = null; state.step = 0; state.answers = {}; render();
  });
}

render();
</script>
</body>
</html>
